<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limelight Inspired</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar d-flex justify-content-between align-items-center px-4">

    <div class="left-icons">
        <i class="fa-solid fa-phone"></i>
        <i class="fa-brands fa-whatsapp"></i>
    </div>

    <div class="right-icons">
        <span>PKR</span>
        <i class="fa-solid fa-magnifying-glass"></i>
        <i class="fa-regular fa-user"></i>
        <i class="fa-solid fa-bag-shopping"></i>
    </div>

</div>

<!-- LOGO -->
<div class="logo-bar text-center">
    LIMELIGHT
</div>

<!-- MENU -->
<div class="menu-bar text-center">
    <a href="#">WOMEN</a>
    <a href="#">GIRLS</a>
    <a href="#" class="sale">SALE</a>
</div>

<!-- GREEN LINE -->
<div class="green-line"></div>


<!-- 🖼️ SMALL BANNER (NOT TOO BIG) -->
<section class="container my-4">
    <img src="images/banner.jpg" class="img-fluid banner">
</section>

<!-- 🧱 CATEGORY GRID -->
<section class="container my-5">
    <div class="row text-center g-4">

        <div class="col-md-3">
            <img src="images/img1.jpg" class="category-img">
            <h6>SUMMER</h6>
        </div>

        <div class="col-md-3">
            <img src="images/img2.jpg" class="category-img">
            <h6>EMBROIDERED</h6>
        </div>

        <div class="col-md-3">
            <img src="images/img3.jpg" class="category-img">
            <h6>PRINTED</h6>
        </div>

        <div class="col-md-3">
            <img src="images/img4.jpg" class="category-img">
            <h6>LAWN</h6>
        </div>

    </div>
</section>

<!-- 🔵 READY TO WEAR -->
<section class="ready-section py-5">
    <div class="container text-center">

        <h2 class="mb-4">READY TO WEAR</h2>

        <div class="row g-4">

            <div class="col-6 col-md-2">
                <img src="images/cat1.jpg" class="circle-img">
                <p>EMBROIDERED</p>
            </div>

            <div class="col-6 col-md-2">
                <img src="images/cat2.jpg" class="circle-img">
                <p>PRINTED</p>
            </div>

            <div class="col-6 col-md-2">
                <img src="images/cat3.jpg" class="circle-img">
                <p>SOLIDS</p>
            </div>

            <div class="col-6 col-md-2">
                <img src="images/cat4.jpg" class="circle-img">
                <p>CO-ORDS</p>
            </div>

            <div class="col-6 col-md-2">
                <img src="images/cat5.jpg" class="circle-img">
                <p>FORMALS</p>
            </div>

            <div class="col-6 col-md-2">
                <img src="images/cat6.jpg" class="circle-img">
                <p>KURTIS</p>
            </div>

        </div>

    </div>
</section>

</body>
</html>
