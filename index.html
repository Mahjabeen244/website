<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limelight | Official Online Store</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="fixed-top">
    <div class="top-black-bar">
        <div class="container-fluid px-5">
            <div class="row align-items-center">
                
                <div class="col-4 d-flex align-items-center">
                    <a href="javascript:void(0)" class="header-icon" id="phoneIcon">
                        <i class="fa-solid fa-phone"></i>
                    </a>
                    <a href="javascript:void(0)" class="header-icon ms-3" id="whatsappIcon">
                        <i class="fa-brands fa-whatsapp"></i>
                    </a>
                </div>

                <div class="col-4 text-center">
                    <h1 class="main-logo">
                        <span class="lime">LIME</span><span class="light">LIGHT</span>
                    </h1>
                </div>

                <div class="col-4 text-end">
                    <a href="javascript:void(0)" class="header-icon me-4" onclick="alert('Redirecting to Search...')">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </a>
                    <a href="javascript:void(0)" class="header-icon me-4" onclick="alert('Redirecting to Account...')">
                        <i class="fa-regular fa-user"></i>
                    </a>
                    <a href="javascript:void(0)" class="header-icon position-relative" onclick="alert('Redirecting to Shopping Bag...')">
                        <i class="fa-solid fa-bag-shopping"></i>
                        <span class="badge-count">1</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
    <div class="header-middle-green"></div>

    <nav class="nav-bar-main">
        <div class="container">
            <ul class="nav justify-content-center">
                <li class="nav-item"><a class="nav-link" href="#">WOMEN</a></li>
                <li class="nav-item"><a class="nav-link" href="#">GIRLS</a></li>
                <li class="nav-item"><a class="nav-link sale-link" href="#">SALE</a></li>
            </ul>
        </div>
    </nav>
</header>

<section class="hero-banner">
    <div class="hero-image-container">
        <div class="dot-navigation">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
    </div>
</section>

<div class="container-fluid text-center mt-5">
    <h2 class="section-heading">UNSTITCHED</h2>
</div>

<main class="container text-center my-5">
    <h2 class="section-title">UNSTITCHED</h2>
    <hr class="mx-auto" style="width: 60px; border-top: 2px solid #000;">
</main>

<script>
    // Header Interactivity: Left Side
    document.getElementById('phoneIcon').addEventListener('click', function() {
        alert('Redirecting to Call Dialer...');
    });
    
    document.getElementById('whatsappIcon').addEventListener('click', function() {
        alert('Redirecting to WhatsApp Chat...');
    });
    const dots = document.querySelectorAll('.dot');
    const heroSection = document.querySelector('.hero-banner');

    // List of your images - Ensure these names match what's in your /images folder!
    const images = [
        'images/signature.webp', 
        'images/ready-to-wear.webp', 
        'images/coord-sets.webp',
        'images/pret.webp',
        'images/sale.webp'
    ];

    dots.forEach((dot, index) => {
        dot.addEventListener('click', () => {
            // Remove 'active' class from all dots
            dots.forEach(d => d.classList.remove('active'));
            // Add 'active' class to the clicked dot
            dot.classList.add('active');
            // Change the background image of the hero section
            heroSection.style.backgroundImage = `url('${images[index]}')`;
        });
    });
</script>

</body>
</html>
