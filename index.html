<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domino's Pizza Pakistan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
        <div class="container-fluid px-3">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Domino%27s_pizza_logo.svg" 
                     alt="Domino's Tile" 
                     width="35" 
                     class="me-2">
                
                <span class="brand-text-bold">Domino's</span>
            </a>

            <div class="collapse navbar-collapse justify-content-center">
                <ul class="navbar-nav fw-bold">
                    <li class="nav-item"><a class="nav-link text-uppercase" href="#">Menu</a></li>
                    <li class="nav-item"><a class="nav-link text-uppercase" href="#">Stores</a></li>
                    <li class="nav-item"><a class="nav-link text-uppercase" href="#">Get the App</a></li>
                </ul>
            </div>

            <div class="d-flex align-items-center me-md-5">
                <div class="cart-wrapper position-relative me-3">
                    <i class="fa-solid fa-cart-shopping fs-3 text-primary"></i>
                    <span class="badge rounded-pill bg-danger cart-badge">0</span>
                </div>
                <div class="account-btn fw-bold text-uppercase d-flex align-items-center">
                    <i class="fa-regular fa-circle-user fs-3 me-2"></i> My Account
                </div>
            </div>
        </div>
    </nav>

    <div class="black-banner py-2">
        <div class="container d-flex justify-content-center">
            <div class="toggle-container">
                <div class="toggle-side delivery-side active" id="deliveryBtn" onclick="setActive('delivery')">
                    <i class="fa-solid fa-motorcycle me-2"></i> DELIVERY
                </div>
                <div class="toggle-or-circle">OR</div>
                <div class="toggle-side pickup-side" id="pickupBtn" onclick="setActive('pickup')">
                    <i class="fa-solid fa-store me-2"></i> PICK UP
                </div>
            </div>
        </div>
    </div>

    <div class="container-fluid px-2 py-2">
        <div class="row g-1">
            
            <div class="col-md-6 col-12">
                <div class="promo-box main-promo rounded-1 shadow-sm overflow-hidden" 
                     style="background-image: url('images/image2.jpg');">
                </div>
            </div>
    
            <div class="col-md-6 col-12">
                <div class="row g-1">
                    <div class="col-12">
                        <div class="promo-box side-promo rounded-1 shadow-sm overflow-hidden" 
                             style="background-image: url('images/image3.jpeg');">
                        </div>
                    </div>
                    
                    <div class="col-12">
                        <div class="promo-box side-promo rounded-1 shadow-sm overflow-hidden" 
                             style="background-image: url('images/image4.jpeg');">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        function setActive(mode) {
            const delivery = document.getElementById('deliveryBtn');
            const pickup = document.getElementById('pickupBtn');
            if (mode === 'delivery') {
                delivery.classList.add('active');
                pickup.classList.remove('active');
            } else {
                pickup.classList.add('active');
                delivery.classList.remove('active');
            }
        }
    </script>
</body>
</html>
